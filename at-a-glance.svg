    </g>
    <text x="28" y="82" fill="#8FD14F" font-family="Arial, sans-serif" font-size="26" font-weight="700">3+ Years</text>
    <text x="28" y="106" fill="#9aa89f" font-family="Arial, sans-serif" font-size="14" letter-spacing="1.5">EXPERIENCE</text>
  </g>

  <!-- Card 2: Focus -->
  <g transform="translate(241,0)">
